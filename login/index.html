<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – pausuu.xyz</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0c0c0c;
            font-family: "Inter", sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* NAVBAR */
        .nav-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 40px;
        }

        nav {
            background: #111;
            padding: 14px 28px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 34px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        .logo {
            font-size: 17px;
            font-weight: 600;
            color: #e5e5e5;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-left: 10px;
        }

        .nav-links a {
            color: #cfcfcf;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        .signup-btn {
            padding: 8px 20px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: 0.2s;
        }

        .signup-btn:hover {
            background: #3a6fcc;
        }

        /* LOGIN BOX */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 140px);
            width: 100%;
        }

        .login-box {
            background: #111;
            padding: 50px 40px;
            border-radius: 18px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        .login-box h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .login-box p {
            font-size: 16px;
            color: #b3b3b3;
            margin-bottom: 32px;
        }

        .discord-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            background: #5865F2;
            padding: 14px 20px;
            border-radius: 10px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
        }

        .discord-btn:hover {
            background: #4752c4;
        }

        .discord-logo {
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="nav-wrapper">
    <nav>
        <div class="logo">pausuu.xyz</div>

        <div class="nav-links">
            <a href="/discover">Discover</a>
            <a href="/recent">Recent</a>
            <a href="/pricing">Pricing</a>
        </div>

        <a class="signup-btn" id="nav-auth-btn" href="/login">Sign up</a>
    </nav>
</div>

<!-- LOGIN BOX -->
<div class="login-container">
    <div class="login-box">
        <h1>Welcome back</h1>
        <p>Sign in with Discord to continue.</p>

        <a class="discord-btn" href="https://discord.com/oauth2/authorize?client_id=1509823720393408652&response_type=token&redirect_uri=https%3A%2F%2Fpausuu.xyz%2Flogin&scope=identify%20guilds.members.read">

            <!-- INLINE SVG DISCORD LOGO (GUARANTEED TO WORK) -->
            <svg class="discord-logo" viewBox="0 0 245 240" xmlns="http://www.w3.org/2000/svg" fill="white">
                <path d="M104.4 103.9c-5.7 0-10.2 5-10.2 11.1s4.6 11.1 10.2 11.1c5.7 0 10.2-5 10.2-11.1.1-6.1-4.5-11.1-10.2-11.1zm36.2 0c-5.7 0-10.2 5-10.2 11.1s4.6 11.1 10.2 11.1c5.7 0 10.2-5 10.2-11.1s-4.5-11.1-10.2-11.1z"/>
                <path d="M189.5 20h-134C44.2 20 35 29.2 35 40.6v135.2c0 11.4 9.2 20.6 20.5 20.6h113.4l-5.3-18.5 12.8 11.9 12.1 11.2 21.5 19V40.6c0-11.4-9.2-20.6-20.5-20.6zm-39.7 135s-3.7-4.4-6.8-8.3c13.5-3.8 18.6-12.1 18.6-12.1-4.2 2.8-8.2 4.8-11.8 6.1-5.1 2.1-10 3.5-14.8 4.3-9.8 1.8-18.8 1.3-26.6-.1-5.9-1.1-11-2.6-15.2-4.3-2.4-1-5-2.1-7.6-3.6-.3-.2-.6-.3-.9-.5-.2-.1-.3-.2-.4-.3-1.8-1-2.8-1.7-2.8-1.7s5 8.1 18.2 12c-3.1 3.9-6.9 8.5-6.9 8.5-22.8-.7-31.5-15.7-31.5-15.7 0-33.3 14.9-60.3 14.9-60.3 14.9-11.2 29.1-10.9 29.1-10.9l1 1.2c-18.7 5.4-27.3 13.6-27.3 13.6s2.3-1.3 6.2-3.1c11.3-5 20.3-6.3 24-6.6.6-.1 1.1-.2 1.7-.2 6.1-.8 13-1 20.2-.2 9.5 1.1 19.7 3.9 30.1 9.6 0 0-8.2-7.8-25.8-13.2l1.4-1.6s14.2-.3 29.1 10.9c0 0 14.9 27 14.9 60.3 0 0-8.8 15-31.6 15.7z"/>
            </svg>

            Continue with Discord
        </a>
    </div>
</div>

<script>
// Navbar update
const user = localStorage.getItem("user");
if (user) {
    const btn = document.getElementById("nav-auth-btn");
    btn.textContent = "Dashboard";
    btn.href = "/dashboard";
}

// OAuth handler
async function handleDiscordLogin() {
    const hash = window.location.hash;
    if (!hash.includes("access_token")) return;

    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get("access_token");

    const userRes = await fetch("https://discord.com/api/users/@me", {
        headers: { Authorization: `Bearer ${accessToken}` }
    });

    const user = await userRes.json();

    localStorage.setItem("user", JSON.stringify(user));
    localStorage.setItem("token", accessToken);

    window.location.href = "/dashboard";
}

handleDiscordLogin();
</script>

</body>
</html>
