<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – pausuu.xyz</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0c0c0c;
            font-family: "Inter", sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 40px;
        }

        nav {
            background: #111;
            padding: 14px 28px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 34px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        .logo {
            font-size: 17px;
            font-weight: 600;
            color: #e5e5e5;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-left: 10px;
        }

        .nav-links a {
            color: #cfcfcf;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        .signup-btn {
            padding: 8px 20px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: 0.2s;
        }

        .signup-btn:hover {
            background: #3a6fcc;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 140px);
            width: 100%;
        }

        .login-box {
            background: #111;
            padding: 50px 40px;
            border-radius: 18px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        .discord-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            background: #5865F2;
            padding: 14px 20px;
            border-radius: 10px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
        }

        .discord-btn:hover {
            background: #4752c4;
        }

        .discord-logo {
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>

<div class="nav-wrapper">
    <nav>
        <div class="logo">pausuu.xyz</div>

        <div class="nav-links">
            <a href="/discover">Discover</a>
            <a href="/recent">Recent</a>
            <a href="/pricing">Pricing</a>
        </div>

        <a class="signup-btn" id="nav-auth-btn" href="/login">Sign up</a>
    </nav>
</div>

<div class="login-container">
    <div class="login-box">
        <h1>Welcome back</h1>
        <p>Sign in with Discord to continue.</p>

        <a class="discord-btn" href="https://discord.com/oauth2/authorize?client_id=1509823720393408652&response_type=token&redirect_uri=https%3A%2F%2Fpausuu.xyz%2Flogin&scope=identify%20guilds.members.read">
            <img src="https://raw.githubusercontent.com/pausuu/cdn/main/discord-white.png" class="discord-logo">
            Continue with Discord
        </a>
    </div>
</div>

<script>
// Dynamic navbar
const user = localStorage.getItem("user");
if (user) {
    const btn = document.getElementById("nav-auth-btn");
    btn.textContent = "Dashboard";
    btn.href = "/dashboard";
}

// OAuth handler
async function handleDiscordLogin() {
    const hash = window.location.hash;
    if (!hash.includes("access_token")) return;

    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get("access_token");

    const userRes = await fetch("https://discord.com/api/users/@me", {
        headers: { Authorization: `Bearer ${accessToken}` }
    });

    const user = await userRes.json();

    localStorage.setItem("user", JSON.stringify(user));
    localStorage.setItem("token", accessToken);

    window.location.href = "/dashboard";
}

handleDiscordLogin();
</script>

</body>
</html>
