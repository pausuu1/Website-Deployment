<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – pausuu.xyz</title>

    <!-- Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0c0c0c;
            font-family: "Inter", sans-serif;
            color: white;
        }

        /* HEADER */
        .header {
            width: 100%;
            padding: 20px 40px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0c0c0c;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: fixed;
            top: 0;
            left: 0;
        }

        .header .logo {
            font-size: 20px;
            font-weight: 600;
            color: white;
            text-decoration: none;
        }

        .header .nav {
            display: flex;
            gap: 20px;
        }

        .header .nav a {
            color: #b3b3b3;
            text-decoration: none;
            font-size: 15px;
            transition: 0.2s;
        }

        .header .nav a:hover {
            color: white;
        }

        /* LOGIN BOX */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding-top: 60px;
        }

        .login-box {
            background: #111;
            padding: 50px 40px;
            border-radius: 18px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        .login-box h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .login-box p {
            font-size: 16px;
            color: #b3b3b3;
            margin-bottom: 32px;
        }

        .discord-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            background: #5865F2;
            padding: 14px 20px;
            border-radius: 10px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
        }

        .discord-btn:hover {
            background: #4752c4;
        }

        .discord-btn img {
            width: 24px;
            height: 24px;
        }

        .terms {
            margin-top: 22px;
            font-size: 13px;
            color: #8f8f8f;
        }

        .terms a {
            color: #cfcfcf;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <a href="/" class="logo">pausuu.xyz</a>

        <div class="nav">
            <a href="/discover">Discover</a>
            <a href="/recent">Recent</a>
            <a href="/pricing">Pricing</a>
            <a href="/login" style="color:white;font-weight:600;">Login</a>
        </div>
    </div>

    <!-- LOGIN BOX -->
    <div class="login-container">
        <div class="login-box">
            <h1>Welcome back</h1>
            <p>Connect your Discord to sign in or create an account.</p>

            <!-- Your OAuth URL (implicit flow) -->
            <a class="discord-btn" href="https://discord.com/oauth2/authorize?client_id=1509823720393408652&response_type=token&redirect_uri=https%3A%2F%2Fpausuu.xyz%2Flogin&scope=identify%20guilds.members.read">
                <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f47e.svg">
                Continue with Discord
            </a>

            <div class="terms">
                By continuing, you agree to our 
                <a href="#">Terms</a> and 
                <a href="#">Privacy Policy</a>.
            </div>
        </div>
    </div>

<script>
// Handle Discord OAuth implicit login
async function handleDiscordLogin() {
    const hash = window.location.hash;
    if (!hash.includes("access_token")) return;

    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get("access_token");

    // Fetch user info
    const userRes = await fetch("https://discord.com/api/users/@me", {
        headers: { Authorization: `Bearer ${accessToken}` }
    });

    const user = await userRes.json();

    // Save user info locally
    localStorage.setItem("user", JSON.stringify(user));
    localStorage.setItem("token", accessToken);

    // Redirect to dashboard
    window.location.href = "/dashboard";
}

handleDiscordLogin();
</script>

</body>
</html>
