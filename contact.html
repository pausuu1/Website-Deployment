<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pausuu | Contact</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a0a0a;
            color: #eaeaea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            height: 80px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #FF3B3B;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #eaeaea;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #FF3B3B;
        }

        main {
            flex: 1;
            padding: 40px 50px;
            box-sizing: border-box;
        }

        footer {
            height: 60px;
            background: #0d0d0d;
            color: #bdbdbd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .footer-socials a {
            margin-left: 15px;
            color: #bdbdbd;
            font-size: 22px;
            transition: 0.3s;
        }

        .footer-socials a:hover {
            color: #FF3B3B;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">PAUSUU</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

    <p style="font-size:20px; line-height:1.8;">
        <i class="fa-brands fa-discord" style="color:#FF3B3B;"></i> @pausuu<br>
        <i class="fa-brands fa-x-twitter" style="color:#FF3B3B;"></i> @pausuuofficial<br>
        <i class="fa-solid fa-envelope" style="color:#FF3B3B;"></i> pausuubusiness@gmail.com
    </p>
</main>

<footer>

    <div class="footer-socials">

</footer>

</html>
