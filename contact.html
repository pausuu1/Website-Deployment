<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pausuu | Contact</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a0a0a;
            color: #eaeaea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            height: 80px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #FF3B3B;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #eaeaea;
            font-weight: 500;
            transition: color 0.3s, transform 0.3s;
        }

        nav a:hover {
            color: #FF3B3B;
            transform: translateY(-2px);
        }

        main {
            flex: 1;
            padding: 40px 50px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            color: #bdbdbd;
            margin-bottom: 40px;
        }

        .contact-box {
            display: inline-block;
            padding: 25px 40px;
            border: 2px solid #FF3B3B;
            border-radius: 8px;
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .contact-box:hover {
            transform: scale(1.05);
            background: #FF3B3B;
            color: #0a0a0a;
        }

        .contact-box i {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .contact-email {
            font-size: 20px;
            font-weight: 600;
            margin-top: 5px;
        }

        footer {
            height: 60px;
            background: #0d0d0d;
            color: #bdbdbd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .footer-socials a {
            margin-left: 15px;
            color: #bdbdbd;
            font-size: 22px;
            transition: transform 0.25s ease, color 0.25s ease;
        }

        .footer-socials a:hover {
            transform: scale(1.2);
            color: #FF3B3B;
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-up {
            animation: slideUp 0.7s ease forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">PAUSUU</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="latest-projects.html">Latest Projects</a>
        <a href="experience.html">Experience</a>
        <a href="contact.html">Contact</a>
        <a href="links.html">Links</a>
        <a href="credits.html">Credits</a>
    </nav>
</header>

<main class="fade-in">
    <h1 class="slide-up">Contact Me</h1>
    <p>If you’d like to reach out for business, collaboration, or anything else, you can contact me here.</p>

    <a href="mailto:pausuubusiness@gmail.com" class="contact-box fade-in">
        <i class="fa-solid fa-envelope"></i>
        <div class="contact-email">pausuubusiness@gmail.com</div>
    </a>
</main>

<footer>
    <div>© 2026 Pausuu</div>

    <div class="footer-socials">
        <a href="https://www.youtube.com/@pausuu" target="_blank"><i class="fa-brands fa-youtube"></i></a>
        <a href="https://discord.gg/4N5sf3aGKW" target="_blank"><i class="fa-brands fa-discord"></i></a>
        <a href="https://www.twitch.tv/pausuugames" target="_blank"><i class="fa-brands fa-twitch"></i></a>
        <a href="https://x.com/pausuuofficial" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="https://github.com/pausuuofficial" target="_blank"><i class="fa-brands fa-github"></i></a>
    </div>
</footer>

</body>
</html>
