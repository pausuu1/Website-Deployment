<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <style>
        body {
            margin: 0;
            background: #000;
            background-size: cover;
            background-position: center;
            color: white;
            font-family: Arial, sans-serif;
        }

        .card {
            width: 380px;
            margin: 60px auto;
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            margin: 0 auto 10px;
        }

        .links a {
            display: block;
            margin: 8px 0;
            color: #4f8cff;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar" id="avatar"></div>
    <h2 id="username"></h2>
    <p id="bio"></p>

    <h3>Links</h3>
    <div class="links" id="links"></div>

    <h3>Song</h3>
    <audio id="songPlayer" controls style="width:100%;"></audio>
</div>

<script>
    // get username from URL
    const params = new URLSearchParams(window.location.search);
    const username = params.get("u");

    // load saved profile data
    const data = JSON.parse(localStorage.getItem("profileData") || "{}");

    // fill in profile
    document.getElementById("username").textContent = username || "Unknown User";
    document.getElementById("bio").textContent = data.bio || "";

    // background
    if (data.background) {
        document.body.style.backgroundImage = `url(${data.background})`;
    }

    // avatar (Discord)
    const user = JSON.parse(localStorage.getItem("user"));
    if (user && user.avatar) {
        document.getElementById("avatar").style.backgroundImage =
            `url(https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=256)`;
    }

    // links
    const linksDiv = document.getElementById("links");
    if (data.links) {
        data.links.forEach(link => {
            const a = document.createElement("a");
            a.href = link.url;
            a.target = "_blank";
            a.textContent = link.label;
            linksDiv.appendChild(a);
        });
    }

    // song
    if (data.songData) {
        document.getElementById("songPlayer").src = data.songData;
    }
</script>

</body>
</html>
