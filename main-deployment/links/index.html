<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links – Pausuu</title>

  <style>
    html, body {
      overflow: hidden;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      position: fixed;
      top: 25px;
      right: 35px;
      display: flex;
      gap: 25px;
      z-index: 10;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      opacity: 0.85;
      transition: 0.2s ease;
      border-bottom: 1px solid transparent;
    }

    nav a:hover {
      opacity: 1;
      border-bottom: 1px solid #ffffff60;
    }

    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 25px;
    }

    .links-grid {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }

    .icon-btn {
      width: 55px;
      height: 55px;
      padding: 12px;
      background: #ffffff10;
      border: 1px solid #ffffff20;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: 0.2s ease;
      cursor: pointer;
    }

    .icon-btn:hover {
      background: #ffffff20;
      border-color: #ffffff40;
      transform: scale(1.08);
    }

    .icon-btn img {
      width: 28px;
      height: 28px;
      filter: invert(1);
    }
  </style>
</head>

<body>

  <nav>
    <a href="/main-deployment">Home</a>
    <a href="/main-deployment/contact">Contact</a>
    <a href="/main-deployment/links">Links</a>
    <a href="/main-deployment/credits">Credits</a>
  </nav>

  <div class="center">
    <h1>My Links</h1>

    <div class="links-grid">
      <a class="icon-btn" href="https://youtube.com" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg">
      </a>

      <a class="icon-btn" href="https://twitter.com" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg">
      </a>

      <a class="icon-btn" href="https://tiktok.com" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg">
      </a>

      <a class="icon-btn" href="https://twitch.tv" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/twitch.svg">
      </a>

      <a class="icon-btn" href="https://discord.com" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg">
      </a>

      <a class="icon-btn" href="https://github.com" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg">
      </a>
    </div>
  </div>

</body>
</html>
