<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pausuu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAVIGATION */
    nav {
      position: fixed;
      top: 25px;
      right: 35px;
      display: flex;
      gap: 25px;
      z-index: 10;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      opacity: 0.85;
      transition: 0.2s ease;
      border-bottom: 1px solid transparent;
    }

    nav a:hover {
      opacity: 1;
      border-bottom: 1px solid #ffffff60;
    }

    /* CENTER CONTENT */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .bio {
      font-size: 1.2rem;
      opacity: 0.8;
      max-width: 600px;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      background: #ffffff10;
      border: 1px solid #ffffff20;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #ffffff20;
      border-color: #ffffff40;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a href="/main-deployment">Home</a>
    <a href="/main-deployment/contact">Contact</a>
  </nav>

  <!-- CENTERED PROFILE CONTENT -->
  <div class="center">

    <h1>Pausuu</h1>

    <div class="bio">
      Content creator, video editor, and programmer.
    </div>

    <a href="/main-deployment/contact" class="btn">Contact</a>

  </div>

</body>
</html>
