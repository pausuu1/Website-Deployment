<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pausuu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* NAVIGATION */
    nav {
      position: absolute;
      top: 25px;
      right: 35px;
      display: flex;
      gap: 25px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      opacity: 0.85;
      transition: 0.2s ease;
      border-bottom: 1px solid transparent;
    }

    nav a:hover {
      opacity: 1;
      border-bottom: 1px solid #ffffff60;
    }

    /* MAIN CONTENT */
    .center {
      margin-top: 120px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      background: #ffffff10;
      border: 1px solid #ffffff20;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #ffffff20;
      border-color: #ffffff40;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a href="/main-deployment">Home</a>
    <a href="/main-deployment/contact">Contact</a>
  </nav>

  <!-- MAIN -->
  <div class="center">
    <h1>Welcome to Pausuu</h1>
    <p>Your space on the internet — simple, clean, and expanding soon.</p>

    <a href="/main-deployment/contact" class="btn">Contact</a>
  </div>

</body>
</html>
