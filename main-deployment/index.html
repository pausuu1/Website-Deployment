<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pausuu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
      text-align: center;
      max-width: 600px;
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      background: #ffffff10;
      border: 1px solid #ffffff20;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #ffffff20;
      border-color: #ffffff40;
    }
  </style>
</head>

<body>

  <h1>Welcome to Pausuu</h1>
  <p>Your space on the internet — simple, clean, and expanding soon.</p>

  <div class="buttons">
    <a href="/about" class="btn">About</a>
    <a href="/projects" class="btn">Projects</a>
    <a href="/contact" class="btn">Contact</a>
    <a href="/example" class="btn">Example</a>
  </div>

</body>
</html>
