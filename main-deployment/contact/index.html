<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – Pausuu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAVIGATION */
    nav {
      position: fixed;
      top: 25px;
      right: 35px;
      display: flex;
      gap: 25px;
      z-index: 10;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      opacity: 0.85;
      transition: 0.2s ease;
      border-bottom: 1px solid transparent;
    }

    nav a:hover {
      opacity: 1;
      border-bottom: 1px solid #ffffff60;
    }

    /* CENTER CONTENT */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.8;
      max-width: 600px;
      margin-bottom: 30px;
    }

    .contact-box {
      background: #ffffff10;
      border: 1px solid #ffffff20;
      padding: 25px 35px;
      border-radius: 10px;
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .item {
      margin: 15px 0;
      font-size: 1rem;
    }

    a {
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid #ffffff30;
      transition: 0.2s ease;
    }

    a:hover {
      border-bottom-color: #ffffff80;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a href="/main-deployment">Home</a>
    <a href="/main-deployment/contact">Contact</a>
  </nav>

  <!-- CENTERED CONTENT -->
  <div class="center">
    <h1>Contact Me</h1>
    <p>Feel free to reach out through any of the platforms below.</p>

    <div class="contact-box">
      <div class="item">Discord: <strong>@pausuu</strong></div>
      <div class="item">Twitter: <a href="https://twitter.com/pausuuofficial" target="_blank">@pausuuofficial</a></div>
      <div class="item">Business Email: <a href="mailto:pausuubusiness@gmail.com">pausuubusiness@gmail.com</a></div>
    </div>
  </div>

</body>
</html>
