<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – Pausuu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-align: center;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.8;
      text-align: center;
      max-width: 600px;
      margin-bottom: 30px;
    }

    .contact-box {
      background: #ffffff10;
      border: 1px solid #ffffff20;
      padding: 25px 35px;
      border-radius: 10px;
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .item {
      margin: 15px 0;
      font-size: 1rem;
    }

    a {
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid #ffffff30;
      transition: 0.2s ease;
    }

    a:hover {
      border-bottom-color: #ffffff80;
    }

    .back {
      margin-top: 40px;
      opacity: 0.7;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <h1>Contact Me</h1>
  <p>Feel free to reach out through any of the platforms below.</p>

  <div class="contact-box">
    <div class="item">Discord: <strong>yourdiscord</strong></div>
    <div class="item">Twitter: <a href="https://twitter.com/yourhandle" target="_blank">@yourhandle</a></div>
    <div class="item">Email: <a href="mailto:you@example.com">you@example.com</a></div>
  </div>

  <div class="back">
    <a href="/main-deployment">← Back to Home</a>
  </div>

</body>
</html>
