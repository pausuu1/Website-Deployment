<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pausuu.xyz</title>

    <!-- Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            font-family: "Inter", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* NAVBAR WRAPPER */
        .nav-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 40px;
        }

        /* NAVBAR */
        nav {
            background: #111;
            padding: 14px 26px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 32px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        /* LOGO */
        .logo {
            font-size: 17px;
            font-weight: 600;
            color: #e5e5e5;
        }

        /* NAV LINKS */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 22px;
            margin-left: 10px;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        /* SEARCH ICON */
        .search-icon {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-left: 6px;
            opacity: 0.7;
            transition: 0.2s;
        }

        .search-icon:hover {
            opacity: 1;
        }

        /* SIGN UP BUTTON */
        .signup-btn {
            padding: 8px 18px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            margin-left: 6px;
            transition: 0.2s;
        }

        .signup-btn:hover {
            background: #3a6fcc;
        }

        /* HERO SECTION */
        .hero {
            text-align: center;
            margin-top: 80px;
            max-width: 700px;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 600;
            color: white;
            margin-bottom: 16px;
        }

        .hero p {
            font-size: 18px;
            color: #b3b3b3;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 14px;
        }

        .hero-btn-primary {
            padding: 12px 26px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            text-decoration: none;
            font-size: 16px;
        }

        .hero-btn-secondary {
            padding: 12px 26px;
            background: #1a1a1a;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            text-decoration: none;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="nav-wrapper">
        <nav>
            <div class="logo">pausuu.xyz</div>

            <div class="nav-links">
                <a href="https://pausuu.xyz/discover">Discover</a>
                <a href="https://pausuu.xyz/recent">Recent</a>
                <a href="https://pausuu.xyz/pricing">Pricing</a>
            </div>

            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
            </svg>

            <a class="signup-btn" href="https://pausuu.xyz/login">Sign up</a>
        </nav>
    </div>

    <!-- HERO SECTION -->
    <section class="hero">
        <h1>Your very own profile, one link.</h1>
        <p>Link your socials, show your community badges, and share everything from one clean link. Free for everyone.</p>

        <div class="hero-buttons">
            <a class="hero-btn-primary" href="https://pausuu.xyz/login">Sign up</a>
            <a class="hero-btn-secondary" href="https://pausuu.xyz/pricing">View pricing</a>
        </div>
    </section>

</body>
</html>
