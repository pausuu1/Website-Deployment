<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pausuu | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a0a0a;
            color: #eaeaea;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #A259FF;
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #eaeaea;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #A259FF;
        }

        .hero {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 50px;
        }

        .hero h1 {
            font-size: 80px;
            margin: 0;
            color: #ffffff;
        }

        .hero p {
            font-size: 22px;
            max-width: 600px;
            margin-top: 15px;
            color: #bdbdbd;
        }

        .buttons {
            margin-top: 40px;
        }

        .buttons a {
            display: inline-block;
            padding: 12px 28px;
            margin-right: 15px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary {
            background-color: #A259FF;
            color: #0a0a0a;
        }

        .btn-primary:hover {
            background-color: #c58aff;
        }

        .btn-outline {
            border: 2px solid #A259FF;
            color: #A259FF;
        }

        .btn-outline:hover {
            background-color: #A259FF;
            color: #0a0a0a;
        }

        .socials {
            margin-top: 50px;
        }

        .socials a {
            margin-right: 20px;
            color: #bdbdbd;
            font-size: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .socials a:hover {
            color: #A259FF;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">PAUSUU</div>
    <nav>
        <a href="#projects">Projects</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Pausuu</h1>
    <p>Crafting bold digital experiences with a dark aesthetic and a creative edge. I build projects that blend design, code, and personality.</p>

    <div class="buttons">
        <a href="#projects" class="btn-primary">View Projects</a>
        <a href="#about" class="btn-outline">About Me</a>
    </div>

    <div class="socials">
        <a href="#">GitHub</a>
        <a href="#">LinkedIn</a>
        <a href="#">Instagram</a>
    </div>
</section>

</body>
</html>
