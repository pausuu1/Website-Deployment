<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pausuu.xyz</title>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Inter", sans-serif;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 25px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .logo {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    nav {
      display: flex;
      gap: 25px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      opacity: 0.85;
      transition: 0.2s;
    }

    nav a:hover {
      opacity: 1;
    }

    /* MAIN CONTENT */
    .content {
      padding-top: 160px;
      text-align: center;
      max-width: 900px;
      margin: auto;
    }

    .content h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      position: relative;
      display: inline-block;
    }

    .content p {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 60px;
      line-height: 1.6;
    }

    /* SECTION TITLES */
    h2 {
      font-size: 2rem;
      margin-bottom: 40px;
    }

    /* ICON ROWS */
    .icons {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin-bottom: 80px;
    }

    .icons img {
      width: 70px;
      opacity: 0.85;
      transition: 0.2s;
    }

    .icons img:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    /* PARTICLES */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #ffffff40;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(1px);
    }
  </style>
</head>

<body>

<header>
  <div class="logo">pausuu.xyz</div>
  <nav>
    <a href="/">Home</a>
    <a href="/projects">Projects</a>
  </nav>
</header>

<div class="content">

  <!-- INTRO -->
  <h1 id="introText">I'm pausuu</h1>
  <p>a self-taught editor, programmer, and developer<br>
  I like editing and coding for fun</p>

  <!-- SOFTWARES -->
  <h2>Softwares I Use</h2>
  <div class="icons">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/unity/unity-original.svg">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg">

    <!-- NEW Premiere Pro Logo -->
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/premierepro/premierepro-plain.svg">

    <!-- NEW After Effects Logo -->
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/aftereffects/aftereffects-plain.svg">

    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/blender/blender-original.svg">
  </div>

  <!-- CONTACT -->
  <h2>Contact Me</h2>
  <div class="icons">
    <!-- Email -->
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">

    <!-- X (Twitter) -->
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/twitter/twitter-original.svg">

    <!-- Discord -->
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/discord/discord-original.svg">
  </div>

</div>

<script>
  /* PARTICLES ON INTRO TEXT */
  const intro = document.getElementById("introText");
  const content = document.querySelector(".content");

  function createParticle() {
    const particle = document.createElement("div");
    particle.classList.add("particle");

    const size = Math.random() * 6 + 3;
    particle.style.width = size + "px";
    particle.style.height = size + "px";

    const rect = intro.getBoundingClientRect();
    const x = rect.left + rect.width / 2 + (Math.random() - 0.5) * 200;
    const y = rect.top + window.scrollY + (Math.random() - 0.5) * 80;

    particle.style.left = x + "px";
    particle.style.top = y + "px";

    document.body.appendChild(particle);

    gsap.to(particle, {
      opacity: 0,
      y: -40,
      x: (Math.random() - 0.5) * 80,
      duration: 1.5,
      ease: "power1.out",
      onComplete: () => particle.remove(),
    });
  }

  setInterval(createParticle, 200);
</script>

</body>
</html>
