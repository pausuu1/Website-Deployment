<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pausuu</title>

  <style>
    html, body {
      overflow: hidden;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: "Inter", sans-serif;
      background: #0d0d0d;
      color: #fff;
    }

    nav {
      position: fixed;
      top: 20px;
      right: 25px;
      display: flex;
      gap: 25px;
      z-index: 10;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      opacity: 0.85;
      transition: 0.2s ease;
      border-bottom: 1px solid transparent;
    }

    nav a:hover {
      opacity: 1;
      border-bottom: 1px solid #ffffff60;
    }

    .center {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    @keyframes zoomPulse {
      0% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 0.85; }
    }

    .animated-text {
      animation: zoomPulse 3s ease-in-out infinite;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .bio {
      font-size: 1.2rem;
      opacity: 0.8;
      max-width: 600px;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <nav>
    <a href="/">Home</a>
    <a href="/contact">Contact</a>
    <a href="/links">Links</a>
    <a href="/credits">Credits</a>
  </nav>

  <div class="center animated-text">
    <h1>Pausuu</h1>
    <div class="bio">Content creator, video editor, and programmer.</div>
  </div>

</body>
</html>
