<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon – Pausuu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    /* ZOOM ANIMATION */
    @keyframes zoomPulse {
      0% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 0.85; }
    }

    .container {
      animation: zoomPulse 3s ease-in-out infinite;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
      max-width: 600px;
      line-height: 1.5;
    }

    /* AUDIO CONTROLS (TOP LEFT) */
    .audio-controls {
      position: fixed;
      top: 25px;
      left: 25px;
      display: flex;
      align-items: center;
      background: #ffffff10;
      border: 1px solid #ffffff20;
      padding: 10px 14px;
      border-radius: 8px;
      backdrop-filter: blur(6px);
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      cursor: pointer;
      opacity: 0.8;
      transition: 0.2s ease;
      filter: invert(1);
    }

    .icon-btn:hover {
      opacity: 1;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Coming Soon</h1>
    <p>The site is currently being built. Check back soon.</p>
  </div>

  <!-- AUDIO ELEMENT -->
  <audio id="bgMusic" loop muted></audio>

  <!-- AUDIO CONTROLS -->
  <div class="audio-controls">
    <img id="muteBtn" class="icon-btn" src="https://raw.githubusercontent.com/pausuu-assets/icons/main/volume-off.svg">
  </div>

  <script>
    // SONG LIST
    const songs = [
      "/music/song-one.mp3",
      "/music/song-two.mp3",
      "/music/song-three.mp3"
    ];

    // PICK RANDOM SONG
    const randomSong = songs[Math.floor(Math.random() * songs.length)];

    const music = document.getElementById("bgMusic");
    const muteBtn = document.getElementById("muteBtn");

    // LOAD RANDOM SONG
    music.src = randomSong;
    music.volume = 0.5;

    // ICONS (HOSTED SVGs)
    const iconMuted = "https://raw.githubusercontent.com/pausuu-assets/icons/main/volume-off.svg";
    const iconVolume = "https://raw.githubusercontent.com/pausuu-assets/icons/main/volume-on.svg";

    // MUTE BUTTON
    muteBtn.onclick = () => {
      // If muted, unmute AND play (fixes autoplay block)
      if (music.muted) {
        music.muted = false;
        music.play();
        muteBtn.src = iconVolume;
      } else {
        music.muted = true;
        muteBtn.src = iconMuted;
      }
    };
  </script>

</body>
</html>
