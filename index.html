<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pausuu.xyz</title>
    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            color: white;
            font-family: "Inter", Arial, sans-serif;
        }

        /* NAVBAR */
        nav {
            width: 100%;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 600;
            color: #4f8cff;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 15px;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        .signup-btn {
            padding: 8px 18px;
            background: #4f8cff;
            border-radius: 6px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .signup-btn:hover {
            background: #3a6fcc;
        }

        /* HERO SECTION */
        .hero {
            text-align: center;
            padding: 120px 20px;
        }

        .hero h1 {
            font-size: 52px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 20px;
            opacity: 0.7;
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .discord-login {
            padding: 14px 28px;
            background: #5865F2;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            transition: 0.2s;
        }

        .discord-login:hover {
            background: #4752c4;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">
            <span>🔗</span> pausuu.xyz
        </div>

        <div class="nav-links">
            <a href="https://pausuu.xyz/discover">Discover</a>
            <a href="https://pausuu.xyz/recent">Recent</a>
            <a href="https://pausuu.xyz/pricing">Pricing</a>
            <a class="signup-btn" href="https://pausuu.xyz/login">Sign up</a>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <h1>Your Identity, Your Links</h1>
        <p>Create your own profile, customize your page, and connect all your socials in one clean place.</p>

        <a class="discord-login" href="https://pausuu.xyz/login">
            Sign in with Discord
        </a>
    </section>

</body>
</html>
