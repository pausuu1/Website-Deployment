<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>pausuu.xyz</title>

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            font-family: "Inter", Arial, sans-serif;
            color: white;
        }

        .nav {
            width: 100%;
            padding: 14px 26px;
            background: #111;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
        }

        .nav-center {
            display: flex;
            gap: 26px;
        }

        .nav-center a {
            color: #ccc;
            text-decoration: none;
            font-size: 15px;
            transition: 0.2s;
        }

        .nav-center a:hover {
            color: white;
        }

        .nav-right {
            display: flex;
            align-items: center;
        }

        .nav-btn {
            padding: 8px 18px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        .nav-btn:hover {
            background: #3a6fcc;
        }
    </style>
</head>
<body>

    <div class="nav">
        <!-- left -->
        <div class="nav-left" onclick="location.href='/'">
            pausuu.xyz
        </div>

        <!-- middle -->
        <div class="nav-center">
            <a href="/discover/">Discover</a>
            <a href="/pricing/">Pricing</a>
        </div>

        <!-- right -->
        <div class="nav-right">
            <a id="authBtn" class="nav-btn"></a>
        </div>
    </div>

<script>
    // super simple "logged in" check
    const user = localStorage.getItem("user");
    const authBtn = document.getElementById("authBtn");

    if (user) {
        authBtn.textContent = "Dashboard";
        authBtn.href = "/dashboard/";
    } else {
        authBtn.textContent = "Sign up";
        authBtn.href = "/signup/"; // or your auth page
    }
</script>

</body>
</html>
