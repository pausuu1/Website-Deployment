<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pausuu.xyz</title>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Inter", sans-serif;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 25px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .logo {
      font-size: 1.2rem;
      opacity: 0.9;
      white-space: nowrap;
    }

    nav {
      display: flex;
      gap: 20px;
      white-space: nowrap;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.85;
      transition: 0.2s;
    }

    nav a:hover {
      opacity: 1;
    }

    /* MAIN CONTENT */
    .content {
      padding: 160px 20px 80px;
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
    }

    .content h1 {
      font-size: 2.4rem;
      margin-bottom: 20px;
      position: relative;
      display: inline-block;
      font-weight: 400;
    }

    .intro-prefix {
      font-weight: 400;
    }

    #nameText {
      font-weight: 700;
    }

    .content p {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 60px;
      line-height: 1.6;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 40px;
    }

    .icons {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin-bottom: 80px;
    }

    .icons img {
      width: 70px;
      opacity: 0.9;
      transition: 0.2s;
    }

    .icons img:hover {
      opacity: 1;
      transform: scale(1.08);
    }

    /* PARTICLES */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #ffffff40;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(1px);
    }
  </style>
</head>

<body>

<header>
  <div class="logo">pausuu.xyz</div>
  <nav>
    <a href="/">Home</a>
    <a href="/projects">Projects</a>
  </nav>
</header>

<div class="content">

  <!-- INTRO -->
  <h1>
    <span class="intro-prefix">I'm </span><span id="nameText">pausuu</span>
  </h1>
  <p id="descText">
    a self-taught editor, programmer, and developer<br>
    I like editing and coding for fun
  </p>

  <!-- SOFTWARES -->
  <h2>Softwares I Use</h2>
  <div class="icons">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/unity/unity-original.svg" alt="Unity">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg" alt="VS Code">

    <!-- NEW Premiere Pro Logo -->
    <img src="https://cdn.simpleicons.org/adobepremierepro/9999ff" alt="Premiere Pro">

    <!-- NEW After Effects Logo -->
    <img src="https://cdn.simpleicons.org/adobeaftereffects/9999ff" alt="After Effects">

    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/blender/blender-original.svg" alt="Blender">
  </div>

  <!-- CONTACT -->
  <h2>Contact Me</h2>
  <div class="icons">
    <!-- Email -->
    <img src="https://cdn.simpleicons.org/gmail/ffffff" alt="Email">

    <!-- X (Twitter) -->
    <img src="https://cdn.simpleicons.org/x/ffffff" alt="X">

    <!-- Discord -->
    <img src="https://cdn.simpleicons.org/discord/5865F2" alt="Discord">
  </div>

</div>

<script>
  const nameEl = document.getElementById("nameText");
  const descEl = document.getElementById("descText");

  function createParticleAround(el) {
    const rect = el.getBoundingClientRect();
    const particle = document.createElement("div");
    particle.classList.add("particle");

    const size = Math.random() * 6 + 3;
    particle.style.width = size + "px";
    particle.style.height = size + "px";

    const x = rect.left + rect.width / 2 + (Math.random() - 0.5) * rect.width;
    const y = rect.top + window.scrollY + (Math.random() - 0.5) * rect.height;

    particle.style.left = x + "px";
    particle.style.top = y + "px";

    document.body.appendChild(particle);

    gsap.to(particle, {
      opacity: 0,
      y: -40,
      x: (Math.random() - 0.5) * 80,
      duration: 1.5,
      ease: "power1.out",
      onComplete: () => particle.remove(),
    });
  }

  setInterval(() => {
    createParticleAround(nameEl);
    createParticleAround(descEl);
  }, 220);
</script>

</body>
</html>
