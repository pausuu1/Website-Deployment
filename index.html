<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>pausuu.xyz</title>

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            font-family: "Inter", Arial, sans-serif;
            color: white;
        }

        /* NAV WRAPPER (centers the whole bar) */
        .nav-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        /* NAVBAR (the floating rounded bar) */
        .nav {
            background: #111;
            padding: 14px 26px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 40px;
        }

        /* LEFT */
        .nav-left {
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        /* CENTER LINKS */
        .nav-center {
            display: flex;
            gap: 26px;
        }

        .nav-center a {
            color: #ccc;
            text-decoration: none;
            font-size: 15px;
            transition: 0.2s;
        }

        .nav-center a:hover {
            color: white;
        }

        /* RIGHT SIDE */
        .nav-right {
            margin-left: auto;
        }

        /* Blue button */
        .nav-btn {
            padding: 8px 18px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        .nav-btn:hover {
            background: #3a6fcc;
        }
    </style>
</head>

<body>

    <div class="nav-wrapper">
        <div class="nav">

            <!-- LEFT -->
            <div class="nav-left" onclick="location.href='/'">
                pausuu.xyz
            </div>

            <!-- CENTER -->
            <div class="nav-center">
                <a href="/discover/">Discover</a>
                <a href="/pricing/">Pricing</a>
            </div>

            <!-- RIGHT -->
            <div class="nav-right">
                <a id="authBtn" class="nav-btn"></a>
            </div>

        </div>
    </div>

<script>
    // Simple login check
    const user = localStorage.getItem("user");
    const authBtn = document.getElementById("authBtn");

    if (user) {
        authBtn.textContent = "Dashboard";
        authBtn.href = "/dashboard/";
    } else {
        authBtn.textContent = "Sign up";
        authBtn.href = "/signup/";
    }
</script>

</body>
</html>
