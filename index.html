<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: #0d0d0d;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
        }

        p {
            margin-top: 0.5rem;
            opacity: 0.7;
            font-size: 1.1rem;
        }

        .pulse {
            margin-top: 2rem;
            width: 12px;
            height: 12px;
            background: #ffffff;
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.6); opacity: 1; }
            100% { transform: scale(1); opacity: 0.6; }
        }
    </style>
</head>
<body>
    <h1>Coming Soon</h1>
    <p>pausuu.xyz is under construction</p>
    <div class="pulse"></div>
</body>
</html>
