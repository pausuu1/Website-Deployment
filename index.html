<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pausuu.xyz</title>

  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: #fff;
      font-family: "Inter", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 25px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0d0d0d;
      z-index: 20;
    }

    .logo {
      font-size: 1.2rem;
      color: #fff;
      opacity: 0.9;
      letter-spacing: 0.5px;
    }

    nav {
      display: flex;
      gap: 25px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      opacity: 0.85;
      transition: 0.2s ease;
      border-bottom: 1px solid transparent;
    }

    nav a:hover {
      opacity: 1;
      border-bottom: 1px solid #ffffff60;
    }

    /* DIVIDER */
    .divider {
      margin-top: 90px;
      width: 100%;
      border: none;
      border-top: 1px solid #ffffff20;
    }

    /* CENTER CONTENT */
    .center {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      width: 100%;
    }

    .center h1 {
      font-size: 3rem;
      margin: 0;
      opacity: 0.95;
    }

    .center p {
      margin-top: 10px;
      font-size: 1.2rem;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">pausuu.xyz</div>

  <nav>
    <a href="/">Home</a>
    <a href="/contact">Contact</a>
  </nav>
</header>

<hr class="divider">

<div class="center">
  <h1>pausuu</h1>
  <p>clean. minimal. intentional.</p>
</div>

</body>
</html>
