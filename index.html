<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pausuu | Home</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a0a0a;
            color: #eaeaea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            height: 80px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #FF3B3B;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #eaeaea;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #FF3B3B;
        }

        main {
            flex: 1;
            padding: 40px 50px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        main h1 {
            font-size: 90px;
            margin: 0;
        }

        main p {
            margin-top: 15px;
            max-width: 600px;
            color: #bdbdbd;
        }

        .buttons {
            margin-top: 30px;
        }

        .buttons a {
            display: inline-block;
            padding: 12px 28px;
            margin: 0 10px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary {
            background-color: #FF3B3B;
            color: #0a0a0a;
        }

        .btn-outline {
            border: 2px solid #FF3B3B;
            color: #FF3B3B;
        }

        .btn-outline:hover {
            background-color: #FF3B3B;
            color: #0a0a0a;
        }

        footer {
            height: 60px;
            background: #0d0d0d;
            color: #bdbdbd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .footer-socials a {
            margin-left: 15px;
            color: #bdbdbd;
            font-size: 22px;
            transition: 0.3s;
        }

        .footer-socials a:hover {
            color: #FF3B3B;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">PAUSUU</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>
    <h1>Pausuu</h1>
    <p>Combining work, passion, and creativity to build entertaining experiences.</p>

    <div class="buttons">
        <a href="about.html" class="btn-outline">About Me</a>
        <a href="contact.html" class="btn-primary">Contact</a>
    </div>
</main>

<footer>
    <div>© 2026 Pausuu</div>

    <div class="footer-socials">
        <a href="https://www.youtube.com/@pausuu" target="_blank"><i class="fa-brands fa-youtube"></i></a>
        <a href="https://discord.gg/4N5sf3aGKW" target="_blank"><i class="fa-brands fa-discord"></i></a>
        <a href="https://www.twitch.tv/pausuugames" target="_blank"><i class="fa-brands fa-twitch"></i></a>
        <a href="https://x.com/pausuuofficial" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="https://github.com/pausuuofficial" target="_blank"><i class="fa-brands fa-github"></i></a>
    </div>
</footer>

</body>
</html>
