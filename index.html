<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>pausuu.xyz</title>

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            font-family: "Inter", Arial, sans-serif;
            color: white;
        }

        /* Centers the navbar container */
        .nav-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 24px;
        }

        /* The floating rounded navbar */
        .nav {
            width: 800px; /* screenshot width */
            background: #111;
            padding: 10px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);

            display: flex;
            align-items: center;
        }

        /* LEFT GROUP (logo + links) */
        .nav-left-group {
            display: flex;
            align-items: center;
            gap: 26px; /* EXACT spacing between items */
        }

        .nav-left-group div {
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        .nav-left-group a {
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: 0.2s;
        }

        .nav-left-group a:hover {
            color: white;
        }

        /* RIGHT BUTTON */
        .nav-right {
            margin-left: auto;
        }

        .nav-btn {
            padding: 6px 16px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        .nav-btn:hover {
            background: #3a6fcc;
        }
    </style>
</head>

<body>

    <div class="nav-wrapper">
        <div class="nav">

            <!-- LEFT GROUP -->
            <div class="nav-left-group">
                <div onclick="location.href='/'">pausuu.xyz</div>
                <a href="/discover/">Discover</a>
                <a href="/pricing/">Pricing</a>
            </div>

            <!-- RIGHT BUTTON -->
            <div class="nav-right">
                <a id="authBtn" class="nav-btn"></a>
            </div>

        </div>
    </div>

<script>
    // Simple login check
    const user = localStorage.getItem("user");
    const authBtn = document.getElementById("authBtn");

    if (user) {
        authBtn.textContent = "Dashboard";
        authBtn.href = "/dashboard/";
    } else {
        authBtn.textContent = "Sign up";
        authBtn.href = "/signup/";
    }
</script>

</body>
</html>
