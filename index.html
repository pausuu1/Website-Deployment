<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pausuu.xyz</title>
    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            color: white;
            font-family: "Inter", Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        /* CENTERED ROUNDED NAVBAR */
        .navbar-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        nav {
            background: #111;
            padding: 14px 32px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 40px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            color: #4f8cff;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 26px;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 15px;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        .signup-btn {
            padding: 8px 18px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .signup-btn:hover {
            background: #3a6fcc;
        }
    </style>
</head>
<body>

    <!-- CENTERED ROUNDED NAVBAR -->
    <div class="navbar-wrapper">
        <nav>
            <div class="logo">pausuu.xyz</div>

            <div class="nav-links">
                <a href="https://pausuu.xyz/discover">Discover</a>
                <a href="https://pausuu.xyz/recent">Recent</a>
                <a href="https://pausuu.xyz/pricing">Pricing</a>
                <a class="signup-btn" href="https://pausuu.xyz/login">Sign up</a>
            </div>
        </nav>
    </div>

</body>
</html>
