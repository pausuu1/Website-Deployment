<style>
    body {
        margin: 0;
        background: #0d0d0d;
        font-family: "Inter", Arial, sans-serif;
        color: white;
    }

    .nav-wrapper {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-top: 24px;
    }

    /* WAY less wide + tall + rounded */
    .nav {
        width: 520px; /* significantly reduced width */
        background: #111;
        padding: 12px 20px; /* taller */
        border-radius: 26px; /* very rounded */
        border: 1px solid rgba(255,255,255,0.06);

        display: flex;
        align-items: center;
    }

    .nav-left {
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
    }

    .nav-right-group {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 22px; /* slightly tighter spacing */
    }

    .nav-right-group a {
        color: #ccc;
        text-decoration: none;
        font-size: 14px;
        font-weight: 400;
        transition: 0.2s;
    }

    .nav-right-group a:hover {
        color: white;
    }

    .nav-btn {
        padding: 8px 18px;
        background: #4f8cff;
        border-radius: 12px;
        color: white;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        transition: 0.2s;
    }

    .nav-btn:hover {
        background: #3a6fcc;
    }
</style>

<div class="nav-wrapper">
    <div class="nav">
        <div class="nav-left" onclick="location.href='/'">
            pausuu.xyz
        </div>

        <div class="nav-right-group">
            <a href="/discover/">Discover</a>
            <a href="/pricing/">Pricing</a>
            <a id="authBtn" class="nav-btn"></a>
        </div>
    </div>
</div>

<script>
    const user = localStorage.getItem("user");
    const authBtn = document.getElementById("authBtn");

    if (user) {
        authBtn.textContent = "Dashboard";
        authBtn.href = "/dashboard/";
    } else {
        authBtn.textContent = "Sign up";
        authBtn.href = "/signup/";
    }
</script>
