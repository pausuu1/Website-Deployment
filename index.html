<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pausuu.xyz</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0c0c0c;
            font-family: "Inter", sans-serif;
            color: white;
        }

        .nav-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 40px;
        }

        nav {
            background: #111;
            padding: 14px 28px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 34px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        .logo {
            font-size: 17px;
            font-weight: 600;
            color: #e5e5e5;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-left: 10px;
        }

        .nav-links a {
            color: #cfcfcf;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        .signup-btn {
            padding: 8px 20px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: 0.2s;
        }

        .signup-btn:hover {
            background: #3a6fcc;
        }
    </style>
</head>
<body>

<div class="nav-wrapper">
    <nav>
        <div class="logo">pausuu.xyz</div>

        <div class="nav-links">
            <a href="/discover">Discover</a>
            <a href="/recent">Recent</a>
            <a href="/pricing">Pricing</a>
        </div>

        <a class="signup-btn" id="nav-auth-btn" href="/login">Sign up</a>
    </nav>
</div>

<!-- Your homepage content here -->

<script>
// Update navbar if logged in
const user = localStorage.getItem("user");
if (user) {
    const btn = document.getElementById("nav-auth-btn");
    btn.textContent = "Dashboard";
    btn.href = "/dashboard";
}
</script>

</body>
</html>
