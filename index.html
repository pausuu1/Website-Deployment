<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>pausuu.xyz</title>

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            font-family: "Inter", Arial, sans-serif;
        }

        /* NAVBAR CONTAINER */
        .nav {
            width: 100%;
            padding: 14px 26px;
            background: #111;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* LEFT SIDE (logo) */
        .nav-left {
            font-size: 18px;
            font-weight: 600;
            color: #4f8cff;
            cursor: pointer;
        }

        /* CENTER LINKS */
        .nav-center {
            display: flex;
            gap: 26px;
        }

        .nav-center a {
            color: #ccc;
            text-decoration: none;
            font-size: 15px;
            transition: 0.2s;
        }

        .nav-center a:hover {
            color: white;
        }

        /* RIGHT SIDE */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        /* Search icon */
        .search-icon {
            font-size: 18px;
            color: #ccc;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-icon:hover {
            color: white;
        }

        /* Blue button (Dashboard / Sign in) */
        .nav-btn {
            padding: 8px 18px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .nav-btn:hover {
            background: #3a6fcc;
        }
    </style>
</head>

<body>

    <div class="nav">

        <!-- LEFT -->
        <div class="nav-left" onclick="location.href='/'">
            pausuu.xyz
        </div>

        <!-- CENTER -->
        <div class="nav-center">
            <a href="/discover/">Discover</a>
            <a href="/pricing/">Pricing</a>
        </div>

        <!-- RIGHT -->
        <div class="nav-right">
            <div class="search-icon">🔍</div>
            <a id="authBtn" class="nav-btn"></a>
        </div>

    </div>

<script>
    // Check login state
    const user = localStorage.getItem("user");
    const authBtn = document.getElementById("authBtn");

    if (user) {
        authBtn.textContent = "Dashboard";
        authBtn.href = "/dashboard/";
    } else {
        authBtn.textContent = "Sign in";
        authBtn.href = "/login/";
    }
</script>

</body>
</html>
