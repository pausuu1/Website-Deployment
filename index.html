<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pausuu.xyz</title>
    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            font-family: "Inter", Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        /* Center wrapper */
        .nav-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* Rounded navbar */
        nav {
            background: #111;
            padding: 14px 26px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 32px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        /* Logo text only */
        .logo {
            font-size: 18px;
            font-weight: 600;
            color: #4f8cff;
        }

        /* Nav links */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 22px;
            margin-left: 10px;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 15px;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        /* Search icon (SVG) */
        .search-icon {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-left: 6px;
            opacity: 0.7;
            transition: 0.2s;
        }

        .search-icon:hover {
            opacity: 1;
        }

        /* Sign up button */
        .signup-btn {
            padding: 8px 18px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            margin-left: 6px;
            transition: 0.2s;
        }

        .signup-btn:hover {
            background: #3a6fcc;
        }
    </style>
</head>
<body>

    <div class="nav-wrapper">
        <nav>

            <!-- Logo -->
            <div class="logo">pausuu.xyz</div>

            <!-- Links -->
            <div class="nav-links">
                <a href="https://pausuu.xyz/discover">Discover</a>
                <a href="https://pausuu.xyz/recent">Recent</a>
                <a href="https://pausuu.xyz/pricing">Pricing</a>
            </div>

            <!-- Search icon (SVG) -->
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
            </svg>

            <!-- Sign up button -->
            <a class="signup-btn" href="https://pausuu.xyz/login">Sign up</a>

        </nav>
    </div>

</body>
</html>
