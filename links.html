<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pausuu | Links</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a0a0a;
            color: #eaeaea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            height: 80px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #FF3B3B;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #eaeaea;
            font-weight: 500;
            transition: color 0.3s, transform 0.3s;
        }

        nav a:hover {
            color: #FF3B3B;
            transform: translateY(-2px);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Horizontal layout */
        .links-container {
            display: flex;
            flex-direction: row;
            gap: 50px;
        }

        /* Rise-from-footer animation */
        .link-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: #eaeaea;

            opacity: 0;
            transform: translateY(200px);
            animation: riseUp 0.9s ease forwards;
        }

        /* Stagger timing */
        .link-item:nth-child(1) { animation-delay: 0.15s; }
        .link-item:nth-child(2) { animation-delay: 0.25s; }
        .link-item:nth-child(3) { animation-delay: 0.35s; }
        .link-item:nth-child(4) { animation-delay: 0.45s; }
        .link-item:nth-child(5) { animation-delay: 0.55s; }

        @keyframes riseUp {
            from {
                opacity: 0;
                transform: translateY(200px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Icon styling */
        .link-item i {
            font-size: 55px;
            transition: transform 0.25s ease, color 0.25s ease;
        }

        /* Text hidden until hover */
        .link-item span {
            margin-top: 8px;
            font-size: 15px;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        /* Hover effects */
        .link-item:hover i {
            transform: scale(1.25);
            color: #FF3B3B;
        }

        .link-item:hover span {
            opacity: 1;
        }

        footer {
            height: 60px;
            background: #0d0d0d;
            color: #bdbdbd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .footer-socials a {
            margin-left: 15px;
            color: #bdbdbd;
            font-size: 22px;
            transition: transform 0.25s ease, color 0.25s ease;
        }

        .footer-socials a:hover {
            transform: scale(1.2);
            color: #FF3B3B;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">PAUSUU</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="latest-projects.html">Latest Projects</a>
        <a href="experience.html">Experience</a>
        <a href="contact.html">Contact</a>
        <a href="links.html">Links</a>
        <a href="credits.html">Credits</a>
    </nav>
</header>

<main>
    <div class="links-container">

        <a class="link-item" href="https://www.youtube.com/@pausuu" target="_blank">
            <i class="fa-brands fa-youtube"></i>
            <span>YouTube</span>
        </a>

        <a class="link-item" href="https://discord.gg/4N5sf3aGKW" target="_blank">
            <i class="fa-brands fa-discord"></i>
            <span>Discord</span>
        </a>

        <a class="link-item" href="https://www.twitch.tv/pausuugames" target="_blank">
            <i class="fa-brands fa-twitch"></i>
            <span>Twitch</span>
        </a>

        <a class="link-item" href="https://x.com/pausuuofficial" target="_blank">
            <i class="fa-brands fa-x-twitter"></i>
            <span>Twitter / X</span>
        </a>

        <a class="link-item" href="https://github.com/pausuuofficial" target="_blank">
            <i class="fa-brands fa-github"></i>
            <span>GitHub</span>
        </a>

    </div>
</main>

<footer>
    <div>© 2026 Pausuu</div>

    <div class="footer-socials">
        <a href="https://www.youtube.com/@pausuu" target="_blank"><i class="fa-brands fa-youtube"></i></a>
        <a href="https://discord.gg/4N5sf3aGKW" target="_blank"><i class="fa-brands fa-discord"></i></a>
        <a href="https://www.twitch.tv/pausuugames" target="_blank"><i class="fa-brands fa-twitch"></i></a>
        <a href="https://x.com/pausuuofficial" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="https://github.com/pausuuofficial" target="_blank"><i class="fa-brands fa-github"></i></a>
    </div>
</footer>

</body>
</html>
