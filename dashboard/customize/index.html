<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize – pausuu.xyz</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #1b1b2a 0, #050509 55%, #000 100%);
            font-family: "Inter", sans-serif;
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR (same style as dashboard) */
        .sidebar {
            width: 240px;
            background: #111;
            border-right: 1px solid rgba(255,255,255,0.06);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #e5e5e5;
        }

        .sidebar a {
            text-decoration: none;
            color: #cfcfcf;
            font-size: 15px;
            padding: 10px 14px;
            border-radius: 8px;
            transition: 0.2s;
            display: block;
        }

        .sidebar a:hover {
            background: #1a1a1a;
            color: white;
        }

        .active {
            background: #4f8cff;
            color: white !important;
        }

        .logout {
            margin-top: auto;
            color: #ff6b6b !important;
        }

        /* MAIN AREA */
        .main {
            flex: 1;
            padding: 32px 48px;
            overflow-y: auto;
            position: relative;
        }

        /* subtle wave-ish overlay */
        .main::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 0, rgba(79,140,255,0.12), transparent 55%),
                        radial-gradient(circle at 80% 100%, rgba(255,115,250,0.12), transparent 55%);
            opacity: 0.9;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .top-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 500;
            color: #cfcfcf;
        }

        .back-arrow {
            font-size: 18px;
            cursor: pointer;
            opacity: 0.8;
        }

        .top-right {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 999px;
            font-weight: 500;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(10,10,10,0.9);
            color: #e5e5e5;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(20,20,20,0.95);
        }

        .btn-primary {
            background: #4f8cff;
            border-color: #4f8cff;
            color: white;
        }

        .btn-primary:hover {
            background: #3a6fcc;
        }

        /* PROFILE PREVIEW WRAPPER */
        .preview-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .profile-card {
            width: 360px;
            background: rgba(10,10,15,0.96);
            border-radius: 24px;
            padding: 26px 22px 22px 22px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 18px 45px rgba(0,0,0,0.7);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 999px;
            background: #222;
            background-size: cover;
            background-position: center;
        }

        .name-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .username {
            font-size: 18px;
            font-weight: 600;
        }

        .bio {
            font-size: 13px;
            color: #a9a9a9;
        }

        .section {
            margin-top: 16px;
        }

        .section-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #dcdcdc;
        }

        .section-count {
            font-size: 12px;
            color: #8f8f8f;
        }

        .section-box {
            background: #15151c;
            border-radius: 12px;
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.06);
            font-size: 13px;
            color: #b8b8b8;
        }

        .section-helper {
            margin-top: 6px;
            font-size: 12px;
            color: #8f8f8f;
        }

        .inline-btn {
            margin-top: 8px;
            padding: 7px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            background: #2b2b35;
            color: #e5e5e5;
        }

        .inline-btn-primary {
            background: #4f8cff;
            color: white;
        }

        .inline-btn-boost {
            background: #FF73FA;
            color: white;
        }

        .footer-info {
            margin-top: 18px;
            font-size: 11px;
            color: #8f8f8f;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-title">Account</div>

    <a href="/dashboard">Account</a>
    <a class="active">Customize</a>
    <a href="/dashboard/referral">Referral</a>
    <a href="/dashboard/premium">Premium</a>
    <a href="/dashboard/settings">Settings</a>

    <a class="logout" href="#" onclick="logout()">Log out</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <div class="content">

        <div class="top-row">
            <div class="top-left">
                <span class="back-arrow" onclick="window.location.href='/dashboard'">←</span>
                <span>Editing your page</span>
            </div>

            <div class="top-right">
                <button class="btn">Preview</button>
                <button class="btn">Discard</button>
                <button class="btn btn-primary">Save changes</button>
                <button class="btn">Glass style</button>
                <button class="btn">Change background</button>
            </div>
        </div>

        <div class="preview-wrapper">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="avatar" id="avatar"></div>
                    <div class="name-block">
                        <div class="username" id="username">pausuu</div>
                        <div class="bio">Add a short bio</div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-label-row">
                        <div class="section-title">Song</div>
                    </div>
                    <div class="section-box">No song yet</div>
                    <button class="inline-btn inline-btn-primary">Pick song</button>
                </div>

                <div class="section">
                    <div class="section-label-row">
                        <div class="section-title">Links</div>
                        <div class="section-count">0 / 8</div>
                    </div>
                    <div class="section-box">No links yet</div>
                    <div class="section-helper">Add your first link below to show it on your profile.</div>
                    <button class="inline-btn inline-btn-primary">+ Add link</button>
                </div>

                <div class="section">
                    <div class="section-label-row">
                        <div class="section-title">Posts</div>
                        <div class="section-count">0 / 20</div>
                    </div>
                    <button class="inline-btn inline-btn-boost">Boost to unlock posts</button>
                </div>

                <div class="footer-info">
                    <span>0 views</span>
                    <span>Joined May 2026</span>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
const username = localStorage.getItem("username");

if (!user) {
    window.location.href = "/login";
}

document.getElementById("username").textContent = username || user.username;

const avatarEl = document.getElementById("avatar");
if (user && user.avatar) {
    avatarEl.style.backgroundImage =
        `url(https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128)`;
}

/* LOGOUT */
function logout() {
    localStorage.clear();
    window.location.href = "/";
}
</script>

</body>
</html>
