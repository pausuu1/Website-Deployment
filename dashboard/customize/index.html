<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Customize Profile</title>

    <style>
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        .card {
            width: 380px;
            margin: 0 auto;
            background: #111;
            padding: 20px;
            border-radius: 16px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            margin-bottom: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #4f8cff;
            color: white;
        }

        .link-item {
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
        }

        .remove {
            color: #ff6b6b;
            cursor: pointer;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Customize Your Profile</h2>

<div class="card">

    <div class="avatar" id="avatar"></div>

    <h3 id="username">username</h3>

    <textarea id="bio" placeholder="Your bio..." style="width:100%;height:60px;"></textarea>

    <h4>Background</h4>
    <button onclick="bgInput.click()">Change Background</button>
    <input type="file" id="bgInput" accept="image/*">

    <h4>Song</h4>
    <button onclick="songInput.click()">Upload MP3</button>
    <input type="file" id="songInput" accept="audio/mp3,audio/mpeg">
    <p id="songName" style="font-size:12px;color:#ccc;"></p>

    <h4>Links</h4>
    <div id="links"></div>
    <button onclick="addLink()">+ Add Link</button>

    <br><br>
    <button onclick="save()">Save Changes</button>
    <button style="background:#444;" onclick="discard()">Discard</button>
    <button style="background:#222;" onclick="preview()">Preview</button>

</div>

<script>
    // Load Discord user (from your OAuth login)
    const user = JSON.parse(localStorage.getItem("user"));
    const username = localStorage.getItem("username") || user?.username || "unknown";

    document.getElementById("username").textContent = username;

    if (user && user.avatar) {
        document.getElementById("avatar").style.backgroundImage =
            `url(https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128)`;
    }

    // State
    let state = {
        bio: "",
        background: null,
        songData: null,
        songName: "",
        links: []
    };

    // Load saved data
    function load() {
        const saved = JSON.parse(localStorage.getItem("profileData") || "{}");

        state.bio = saved.bio || "";
        state.background = saved.background || null;
        state.songData = saved.songData || null;
        state.songName = saved.songName || "";
        state.links = saved.links || [];

        document.getElementById("bio").value = state.bio;
        document.getElementById("songName").textContent = state.songName;

        renderLinks();
    }

    function renderLinks() {
        const box = document.getElementById("links");
        box.innerHTML = "";

        state.links.forEach((link, i) => {
            const div = document.createElement("div");
            div.className = "link-item";
            div.innerHTML = `
                <span>${link.label}</span>
                <span class="remove" onclick="removeLink(${i})">remove</span>
            `;
            box.appendChild(div);
        });
    }

    function addLink() {
        const label = prompt("Platform name:");
        if (!label) return;

        const url = prompt("URL:");
        if (!url) return;

        state.links.push({ label, url });
        renderLinks();
    }

    function removeLink(i) {
        state.links.splice(i, 1);
        renderLinks();
    }

    // Background upload
    bgInput.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
            state.background = reader.result;
            alert("Background updated!");
        };
        reader.readAsDataURL(file);
    };

    // Song upload
    songInput.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
            state.songData = reader.result;
            state.songName = file.name;
            document.getElementById("songName").textContent = file.name;
        };
        reader.readAsDataURL(file);
    };

    // Save
    function save() {
        state.bio = document.getElementById("bio").value;

        localStorage.setItem("profileData", JSON.stringify(state));
        alert("Saved!");
    }

    // Discard
    function discard() {
        load();
        alert("Changes discarded");
    }

    // Preview
    function preview() {
        window.open(`/profile?u=${username}`, "_blank");
    }

    load();
</script>

</body>
</html>
