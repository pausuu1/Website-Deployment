<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize – pausuu.xyz</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0c0c0c;
            font-family: "Inter", sans-serif;
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: #111;
            border-right: 1px solid rgba(255,255,255,0.06);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #e5e5e5;
        }

        .sidebar a {
            text-decoration: none;
            color: #cfcfcf;
            font-size: 15px;
            padding: 10px 14px;
            border-radius: 8px;
            transition: 0.2s;
            display: block;
        }

        .sidebar a:hover {
            background: #1a1a1a;
            color: white;
        }

        .active {
            background: #4f8cff;
            color: white !important;
        }

        .logout {
            margin-top: auto;
            color: #ff6b6b !important;
        }

        /* MAIN AREA */
        .main {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
        }

        .top-bar {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-bar span {
            opacity: 0.7;
        }

        /* BUTTONS */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #1a1a1a;
            color: white;
        }

        .btn:hover {
            background: #222;
        }

        .btn-save {
            background: #4f8cff;
            border: none;
        }

        .btn-save:hover {
            background: #3a6fcc;
        }

        /* PROFILE PREVIEW CARD */
        .profile-card {
            background: #111;
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.06);
            max-width: 500px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #222;
            margin-bottom: 20px;
        }

        .username {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .bio {
            font-size: 15px;
            color: #cfcfcf;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 8px;
        }

        .section-box {
            background: #1a1a1a;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            color: #cfcfcf;
            font-size: 14px;
        }

        .add-btn {
            margin-top: 10px;
            padding: 10px 16px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }

        .footer-info {
            margin-top: 30px;
            font-size: 13px;
            color: #cfcfcf;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-title">Account</div>

    <a href="/dashboard">Account</a>
    <a class="active">Customize</a>
    <a href="/dashboard/referral">Referral</a>
    <a href="/dashboard/premium">Premium</a>
    <a href="/dashboard/settings">Settings</a>

    <a class="logout" href="#" onclick="logout()">Log out</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <div class="top-bar">
        <span>←</span> Editing your page
    </div>

    <div class="action-buttons">
        <a class="btn">Preview</a>
        <a class="btn">Discard</a>
        <a class="btn btn-save">Save changes</a>
        <a class="btn">Glass style</a>
        <a class="btn">Change background</a>
    </div>

    <div class="profile-card">
        <div class="avatar" id="avatar"></div>

        <div class="username" id="username">username</div>
        <div class="bio">Add a short bio</div>

        <div class="section-title">Song</div>
        <div class="section-box">No song yet</div>
        <a class="add-btn">Pick song</a>

        <div class="section-title">Links (0 / 8)</div>
        <div class="section-box">No links yet</div>
        <a class="add-btn">+ Add link</a>

        <div class="section-title">Posts (0 / 20)</div>
        <a class="add-btn" style="background:#FF73FA;">Boost to unlock posts</a>

        <div class="footer-info">
            0 views • Joined May 2026
        </div>
    </div>

</div>

<script>
/* LOAD USER DATA */
const user = JSON.parse(localStorage.getItem("user"));
const username = localStorage.getItem("username");

if (!user) {
    window.location.href = "/login";
}

/* SET USERNAME */
document.getElementById("username").textContent = username || user.username;

/* SET AVATAR */
document.getElementById("avatar").style.backgroundImage =
    `url(https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128)`;

/* LOGOUT */
function logout() {
    localStorage.clear();
    window.location.href = "/";
}
</script>

</body>
</html>
