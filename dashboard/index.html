<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – pausuu.xyz</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0c0c0c;
            font-family: "Inter", sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* NAVBAR */
        .nav-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 40px;
        }

        nav {
            background: #111;
            padding: 14px 28px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 34px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        .logo {
            font-size: 17px;
            font-weight: 600;
            color: #e5e5e5;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-left: 10px;
        }

        .nav-links a {
            color: #cfcfcf;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        .search-icon {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-left: 6px;
            opacity: 0.75;
            transition: 0.2s;
        }

        .search-icon:hover {
            opacity: 1;
        }

        .signup-btn {
            padding: 8px 20px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: 0.2s;
        }

        .signup-btn:hover {
            background: #3a6fcc;
        }

        /* DASHBOARD BOX */
        .dash-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 140px);
            width: 100%;
        }

        .dash-box {
            background: #111;
            padding: 50px 40px;
            border-radius: 18px;
            width: 90%;
            max-width: 520px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        .username {
            font-size: 26px;
            font-weight: 600;
        }

        .userid {
            font-size: 15px;
            color: #b3b3b3;
            margin-bottom: 25px;
        }

        .logout-btn {
            margin-top: 30px;
            padding: 12px 20px;
            background: #1a1a1a;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.08);
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #222;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="nav-wrapper">
        <nav>
            <div class="logo">pausuu.xyz</div>

            <div class="nav-links">
                <a href="https://pausuu.xyz/discover">Discover</a>
                <a href="https://pausuu.xyz/recent">Recent</a>
                <a href="https://pausuu.xyz/pricing">Pricing</a>
            </div>

            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
            </svg>

            <a class="signup-btn" href="https://pausuu.xyz/login">Sign up</a>
        </nav>
    </div>

    <!-- DASHBOARD -->
    <div class="dash-container">
        <div class="dash-box" id="dash">
            <h1>Loading...</h1>
        </div>
    </div>

<script>
// Load user from localStorage
const user = JSON.parse(localStorage.getItem("user"));
const token = localStorage.getItem("token");

// Redirect if not logged in
if (!user || !token) {
    window.location.href = "/login";
}

// Render dashboard
document.getElementById("dash").innerHTML = `
    <img class="avatar" src="https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png" alt="Avatar">
    <div class="username">${user.username}</div>
    <div class="userid">ID: ${user.id}</div>

    <button class="logout-btn" onclick="logout()">Log out</button>
`;

// Logout function
function logout() {
    localStorage.removeItem("user");
    localStorage.removeItem("token");
    window.location.href = "/login";
}
</script>

</body>
</html>
