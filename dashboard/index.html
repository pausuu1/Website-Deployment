<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0c0c0c;
            font-family: "Inter", sans-serif;
            color: white;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #111;
            padding: 40px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .user-box {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .user-box img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
        }

        .boost-status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
        }

        .boost-yes {
            background: rgba(79, 140, 255, 0.15);
            border: 1px solid rgba(79, 140, 255, 0.4);
            color: #4f8cff;
        }

        .boost-no {
            background: rgba(255, 79, 79, 0.15);
            border: 1px solid rgba(255, 79, 79, 0.4);
            color: #ff4f4f;
        }

        .logout {
            margin-top: 30px;
            display: inline-block;
            padding: 10px 20px;
            background: #1a1a1a;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.08);
            font-weight: 500;
        }

        .logout:hover {
            background: #222;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Your Dashboard</h1>

        <div id="user-box" class="user-box"></div>

        <div id="boost-status"></div>

        <a class="logout" href="#" onclick="logout()">Log out</a>
    </div>

<script>
// Load user from localStorage
const user = JSON.parse(localStorage.getItem("user"));
const token = localStorage.getItem("token");

// If not logged in, redirect to login
if (!user || !token) {
    window.location.href = "/login/index.html";
}

// Display user info
document.getElementById("user-box").innerHTML = `
    <img src="https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png" alt="Avatar">
    <div>
        <p style="font-size: 20px; font-weight: 600;">${user.username}</p>
        <p style="color: #b3b3b3;">ID: ${user.id}</p>
    </div>
`;

// BOOST CHECK
async function checkBoost() {
    const guildId = "YOUR_SERVER_ID_HERE"; // <-- Replace this

    const res = await fetch(`https://discord.com/api/users/@me/guilds/${guildId}/member`, {
        headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();

    if (data.premium_since) {
        document.getElementById("boost-status").innerHTML = `
            <div class="boost-status boost-yes">
                ⭐ You are a premium user (server booster)!
            </div>
        `;
    } else {
        document.getElementById("boost-status").innerHTML = `
            <div class="boost-status boost-no">
                ❌ You are not boosting the server.
            </div>
        `;
    }
}

checkBoost();

// Logout function
function logout() {
    localStorage.removeItem("user");
    localStorage.removeItem("token");
    window.location.href = "/login/index.html";
}
</script>

</body>
</html>
