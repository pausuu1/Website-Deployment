<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – pausuu.xyz</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0c0c0c;
            font-family: "Inter", sans-serif;
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: #111;
            border-right: 1px solid rgba(255,255,255,0.06);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #e5e5e5;
        }

        .sidebar a {
            text-decoration: none;
            color: #cfcfcf;
            font-size: 15px;
            padding: 10px 14px;
            border-radius: 8px;
            transition: 0.2s;
            display: block;
        }

        .sidebar a:hover {
            background: #1a1a1a;
            color: white;
        }

        .active {
            background: #4f8cff;
            color: white !important;
        }

        .logout {
            margin-top: auto;
            color: #ff6b6b !important;
        }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
        }

        .welcome {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtext {
            font-size: 16px;
            color: #cfcfcf;
            margin-bottom: 30px;
        }

        .mypage-btn {
            float: right;
            padding: 10px 20px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        /* STATS CARD */
        .stats-card {
            background: #111;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 30px;
        }

        .stats-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .stats-number {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .graph-placeholder {
            background: #1a1a1a;
            height: 160px;
            border-radius: 12px;
            border: 1px dashed rgba(255,255,255,0.1);
        }

        /* MANAGE ACCOUNT BOX */
        .manage-box {
            background: #111;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .manage-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .manage-sub {
            font-size: 15px;
            color: #cfcfcf;
            margin-bottom: 20px;
        }

        .manage-btn {
            padding: 10px 20px;
            background: #1a1a1a;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-title">Account</div>

    <a class="active">Account</a>
    <a href="/dashboard/customize">Customize</a>
    <a href="/dashboard/referral">Referral</a>
    <a href="/dashboard/premium">Premium</a>
    <a href="/dashboard/settings">Settings</a>

    <a class="logout" href="#" onclick="logout()">Log out</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <a id="mypage" class="mypage-btn">My page</a>

    <div class="welcome" id="welcome-text">Welcome back</div>
    <div class="subtext" id="member-id">pausuu.xyz profile</div>

    <!-- STATS -->
    <div class="stats-card">
        <div class="stats-title">Profile views</div>
        <div class="stats-number">0 total</div>
        <div class="graph-placeholder"></div>
    </div>

    <!-- MANAGE ACCOUNT -->
    <div class="manage-box">
        <div class="manage-title">Manage your account</div>
        <div class="manage-sub">Update your username, display name, profile picture and account settings.</div>
        <a href="/dashboard/settings" class="manage-btn">Open settings</a>
    </div>
</div>

<script>
/* LOAD USER DATA */
const user = JSON.parse(localStorage.getItem("user"));
const hasProfile = localStorage.getItem("hasProfile");
const username = localStorage.getItem("username"); // set during onboarding

if (!user) {
    window.location.href = "/login";
}

/* SET TEXT */
document.getElementById("welcome-text").textContent = `Welcome back, ${username || user.username}`;
document.getElementById("member-id").textContent = `pausuu.xyz profile`;

/* MY PAGE BUTTON */
document.getElementById("mypage").href = `/${username || user.username}`;

/* LOGOUT */
function logout() {
    localStorage.clear();
    window.location.href = "/";
}
</script>

</body>
</html>
