<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – pausuu.xyz</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0c0c0c;
            font-family: "Inter", sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 40px;
        }

        nav {
            background: #111;
            padding: 14px 28px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 34px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        .logo {
            font-size: 17px;
            font-weight: 600;
            color: #e5e5e5;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-left: 10px;
        }

        .nav-links a {
            color: #cfcfcf;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        .signup-btn {
            padding: 8px 20px;
            background: #4f8cff;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: 0.2s;
        }

        .signup-btn:hover {
            background: #3a6fcc;
        }

        .dash-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 140px);
            width: 100%;
        }

        .dash-box {
            background: #111;
            padding: 50px 40px;
            border-radius: 18px;
            width: 90%;
            max-width: 520px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        .username {
            font-size: 26px;
            font-weight: 600;
        }

        .userid {
            font-size: 15px;
            color: #b3b3b3;
            margin-bottom: 25px;
        }

        .logout-btn {
            margin-top: 30px;
            padding: 12px 20px;
            background: #1a1a1a;
            border-radius: 10px;
            color: white;
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #222;
        }
    </style>
</head>
<body>

<div class="nav-wrapper">
    <nav>
        <div class="logo">pausuu.xyz</div>

        <div class="nav-links">
            <a href="/discover">Discover</a>
            <a href="/recent">Recent</a>
            <a href="/pricing">Pricing</a>
        </div>

        <a class="signup-btn" id="nav-auth-btn" href="/login">Sign up</a>
    </nav>
</div>

<div class="dash-container">
    <div class="dash-box" id="dash">
        <h1>Loading...</h1>
    </div>
</div>

<script>
// Dynamic navbar
const user = JSON.parse(localStorage.getItem("user"));
if (user) {
    const btn = document.getElementById("nav-auth-btn");
    btn.textContent = "Dashboard";
    btn.href = "/dashboard";
} else {
    window.location.href = "/login";
}

// Render dashboard
document.getElementById("dash").innerHTML = `
    <img class="avatar" src="https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png" alt="Avatar">
    <div class="username">${user.username}</div>
    <div class="userid">ID: ${user.id}</div>

    <button class="logout-btn" onclick="logout()">Log out</button>
`;

function logout() {
    localStorage.removeItem("user");
    localStorage.removeItem("token");
    window.location.href = "/login";
}
</script>

</body>
</html>
